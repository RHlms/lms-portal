<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Documents #2 — LMS Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#f0f4f7;font-family:'Open Sans',sans-serif;color:#1a2e3d;min-height:100vh;}
  .header{background:#2d637d;padding:14px 24px;display:flex;align-items:center;}
  .header img{height:36px;width:auto;}
  .page-wrap{max-width:600px;margin:0 auto;padding:2rem 1rem 4rem;}
  .hero{background:#2d637d;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;}
  .hero-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-family:'Montserrat',sans-serif;}
  .hero-title{font-size:20px;font-weight:700;color:#fff;font-family:'Montserrat',sans-serif;margin-bottom:2px;}
  .hero-sub{font-size:13px;color:rgba(255,255,255,0.7);}
  .card{background:#fff;border:1px solid #d1dde8;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
  .card-title{font-size:12px;font-weight:700;color:#2d637d;text-transform:uppercase;letter-spacing:.7px;font-family:'Montserrat',sans-serif;margin-bottom:1rem;padding-bottom:10px;border-bottom:1px solid #f0f0f0;}
  .doc-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #f5f5f5;}
  .doc-row:last-child{border-bottom:none;padding-bottom:0;}
  .doc-row:first-of-type{padding-top:0;}
  .doc-check{width:20px;height:20px;border-radius:4px;border:2px solid #d1dde8;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
  .doc-check.checked{background:#2d637d;border-color:#2d637d;}
  .doc-check svg{display:none;}
  .doc-check.checked svg{display:block;}
  .doc-info{flex:1;}
  .doc-name{font-size:14px;font-weight:600;color:#1a2e3d;margin-bottom:2px;}
  .doc-desc{font-size:12px;color:#6b8299;}
  .upload-zone{border:2px dashed #d1dde8;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-top:10px;background:#fafcfe;}
  .upload-zone:hover,.upload-zone.drag{border-color:#2d637d;background:#eef4f8;}
  .upload-zone input{display:none;}
  .upload-icon{font-size:24px;margin-bottom:6px;}
  .upload-text{font-size:13px;font-weight:600;color:#2d637d;margin-bottom:2px;font-family:'Montserrat',sans-serif;}
  .upload-sub{font-size:12px;color:#6b8299;}
  .file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
  .file-item{display:flex;align-items:center;gap:8px;background:#f0f4f7;border-radius:6px;padding:8px 12px;font-size:13px;}
  .file-item-name{flex:1;color:#1a2e3d;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .file-remove{color:#cc5500;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;}
  .submit-btn{width:100%;background:#cc5500;color:#fff;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:14px;border:none;border-radius:8px;cursor:pointer;transition:background .2s;margin-top:8px;}
  .submit-btn:hover{background:#aa4400;}
  .submit-btn:disabled{opacity:0.5;cursor:default;}
  .success-wrap{text-align:center;padding:3rem 1rem;}
  .success-icon{font-size:48px;margin-bottom:16px;}
  .success-title{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;color:#1a2e3d;margin-bottom:8px;}
  .success-sub{font-size:15px;color:#4a6a85;}
  .loading{text-align:center;padding:3rem;color:#6b8299;font-size:15px;}
  .pin-gate{max-width:400px;margin:80px auto;text-align:center;padding:0 20px;}
  .pin-card{background:#fff;border-radius:12px;padding:2rem;border:1px solid #d1dde8;}
  .pin-icon{font-size:36px;margin-bottom:12px;}
  .pin-title{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;color:#1a2e3d;margin-bottom:8px;}
  .pin-sub{font-size:14px;color:#4a6a85;margin-bottom:20px;}
  .pin-input{width:100%;border:2px solid #d1dde8;border-radius:8px;padding:12px;font-size:18px;text-align:center;letter-spacing:8px;font-family:'Montserrat',sans-serif;font-weight:700;outline:none;margin-bottom:12px;}
  .pin-input:focus{border-color:#2d637d;}
  .pin-btn{width:100%;background:#2d637d;color:#fff;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:12px;border:none;border-radius:8px;cursor:pointer;}
  .pin-error{color:#cc5500;font-size:13px;margin-top:8px;display:none;}
</style>
</head>
<body>

<div class="header">
  <img src="https://assets.cdn.filesafe.space/SmS67ZUDphr7uhGrsQGm/media/697b8a464d56837a5ab2bc1b.png" alt="LMS"/>
</div>

<div id="pinGate" class="pin-gate" style="display:none;">
  <div class="pin-card">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">Staff Access Only</div>
    <div class="pin-sub">Enter your PIN to mark documents received.</div>
    <input type="password" class="pin-input" id="pinInput" maxlength="4" placeholder="••••"/>
    <button class="pin-btn" onclick="checkPin()">Continue</button>
    <div class="pin-error" id="pinError">Incorrect PIN. Please try again.</div>
  </div>
</div>

<div id="loadingState" class="loading">Loading...</div>
<div id="mainContent" style="display:none;"></div>
<div id="successState" style="display:none;">
  <div class="success-wrap">
    <div class="success-icon">✅</div>
    <div class="success-title">Documents Uploaded!</div>
    <div class="success-sub">Your offer documents have been received. The LMS team will be in touch shortly.</div>
  </div>
</div>

<script>
const STAFF_PIN = '4567';
const GHL_LOCATION_ID = 'SmS67ZUDphr7uhGrsQGm';
const GHL_API_KEY = 'pit-ef3edd31-9163-4c64-9e18-62633fb931fe';

const oppId = window.location.pathname.split('/offer-docs-2/')[1]?.split('?')[0];

const DOCS = [
  { id: 'asis_contract',    name: 'As-Is Contract',                        desc: 'Fully executed As-Is Residential Contract' },
  { id: 'ss_addendum',      name: 'SS Addendum to As-Is Contract',         desc: 'Short Sale Addendum to the As-Is Contract' },
  { id: 'buyer_pof',        name: 'Buyer #2 Proof of Funds / Pre-Approval',desc: 'Bank statement, pre-approval letter, or proof of funds' },
  { id: 'mls_sheet',        name: 'Updated MLS Sheet',                      desc: 'Current MLS listing printout' },
  { id: 'misc_addenda',     name: 'Misc. Addenda',                          desc: 'Any additional documents or addenda' },
];

let selectedFiles = [];
let checkedDocs = new Set();
let staffUnlocked = false;
let markReceivedMode = false;

function checkPin() {
  const pin = document.getElementById('pinInput').value;
  if (pin === STAFF_PIN) {
    staffUnlocked = true;
    markReceivedMode = true;
    document.getElementById('pinGate').style.display = 'none';
    renderMain();
  } else {
    document.getElementById('pinError').style.display = 'block';
    document.getElementById('pinInput').value = '';
  }
}

function toggleDoc(id) {
  if (checkedDocs.has(id)) checkedDocs.delete(id);
  else checkedDocs.add(id);
  renderMain();
}

function renderMain() {
  const wrap = document.getElementById('mainContent');
  const docsHtml = DOCS.map(doc => `
    <div class="doc-row">
      ${markReceivedMode
        ? `<div class="doc-check ${checkedDocs.has(doc.id) ? 'checked' : ''}" onclick="toggleDoc('${doc.id}')">
             <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
               <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
             </svg>
           </div>`
        : ''
      }
      <div class="doc-info">
        <div class="doc-name">${doc.name}</div>
        <div class="doc-desc">${doc.desc}</div>
      </div>
    </div>
  `).join('');

  const fileListHtml = selectedFiles.length > 0
    ? `<div class="file-list">${selectedFiles.map((f, i) => `
        <div class="file-item">
          <span>📄</span>
          <span class="file-item-name">${f.name}</span>
          <span class="file-remove" onclick="removeFile(${i})">✕</span>
        </div>`).join('')}</div>`
    : '';

  wrap.innerHTML = `
    <div class="page-wrap">
      <div class="hero">
        <div class="hero-label">Offer Documents — Buyer #2</div>
        <div class="hero-title">Upload Offer Documents</div>
        <div class="hero-sub">Please upload all required documents for Buyer #2.</div>
      </div>
      <div class="card">
        <div class="card-title">Required Documents</div>
        ${docsHtml}
      </div>
      <div class="card">
        <div class="card-title">Upload Files</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="handleDrop(event)">
          <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" onchange="handleFiles(this.files)"/>
          <div class="upload-icon">📎</div>
          <div class="upload-text">Click to upload or drag & drop</div>
          <div class="upload-sub">PDF, Word, or image files</div>
        </div>
        ${fileListHtml}
      </div>
      ${markReceivedMode ? `
      <div class="card">
        <div class="card-title">Mark as Received</div>
        <p style="font-size:13px;color:#4a6a85;margin-bottom:14px;">Check the documents above that have been received, then click to update the file.</p>
        <button class="submit-btn" style="background:#2d637d;" onclick="markReceived()">Update File Record</button>
      </div>` : ''}
      <button class="submit-btn" id="submitBtn" onclick="submitDocs()" ${selectedFiles.length === 0 ? 'disabled' : ''}>
        Submit Documents
      </button>
      ${!markReceivedMode ? `<p style="text-align:center;margin-top:12px;font-size:12px;color:#6b8299;">
        Staff: <a href="#" onclick="showPinGate()" style="color:#2d637d;font-weight:600;">Mark Received</a>
      </p>` : ''}
    </div>`;
}

function showPinGate() {
  document.getElementById('pinGate').style.display = 'flex';
  document.getElementById('pinGate').style.flexDirection = 'column';
  document.getElementById('mainContent').style.display = 'none';
}

function handleFiles(files) {
  selectedFiles = [...selectedFiles, ...Array.from(files)];
  renderMain();
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  handleFiles(e.dataTransfer.files);
}

function removeFile(index) {
  selectedFiles.splice(index, 1);
  renderMain();
}

async function submitDocs() {
  if (!selectedFiles.length) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  try {
    for (const file of selectedFiles) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('opportunityId', oppId);
      formData.append('locationId', GHL_LOCATION_ID);

      await fetch(`https://services.leadconnectorhq.com/opportunities/${oppId}/notes`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28' },
        body: JSON.stringify({ body: `Offer Docs #2 uploaded: ${file.name}`, userId: '' })
      });
    }
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('successState').style.display = 'block';
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Submit Documents';
    alert('Upload failed. Please try again.');
  }
}

async function markReceived() {
  try {
    const updates = {};
    if (checkedDocs.has('asis_contract'))  updates['offer_docs_asis_contract_2']   = ['Yes'];
    if (checkedDocs.has('ss_addendum'))    updates['offer_docs_ss_addendum_2']      = ['Yes'];
    if (checkedDocs.has('buyer_pof'))      updates['offer_docs_buyer_pof_2']        = ['Yes'];
    if (checkedDocs.has('mls_sheet'))      updates['offer_docs_mls_sheet_2']        = ['Yes'];
    if (checkedDocs.has('misc_addenda'))   updates['fd_offer_2_misc_addenda_received'] = ['Yes'];

    await fetch(`/api/update-opportunity`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oppId, fields: updates })
    });
    alert('File record updated.');
  } catch (err) {
    alert('Update failed. Please try again.');
  }
}

async function init() {
  if (!oppId) {
    document.getElementById('loadingState').textContent = 'No file ID provided.';
    return;
  }
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  renderMain();
}

init();
</script>
</body>
</html>
